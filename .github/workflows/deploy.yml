name: Auto Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 72.60.166.68
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            # Force NVM Node 20 ahead of system node in PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20 || nvm install 20 --no-progress
            export PATH="$NVM_DIR/versions/node/$(nvm version 20)/bin:$PATH"
            echo "Node: $(node -v), npm: $(npm -v)"

            cd /var/www/burch-contracting

            # Sync to latest main (handle any local drift)
            git fetch origin main
            git stash --include-untracked || true
            git checkout main
            git reset --hard origin/main
            echo "Git: $(git log --oneline -1)"

            # Install dependencies (fall back to npm install if lockfile mismatches)
            rm -rf .next .swc
            npm ci --production=false || (echo "npm ci failed, falling back to npm install" && npm install --production=false)

            # Build
            npm run build
            echo "Build complete"

            # Restart PM2 preserving env vars
            if pm2 describe burch-contracting > /dev/null 2>&1; then
              pm2 restart burch-contracting --update-env
            else
              pm2 start npm --name burch-contracting -- start
            fi
            pm2 save
            echo "Deploy finished at $(date)"
