name: Auto Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 72.60.166.68
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e

            # Force NVM Node 20 ahead of system node in PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20 || nvm install 20 --no-progress
            export PATH="$NVM_DIR/versions/node/$(nvm version 20)/bin:$PATH"
            echo "Node: $(node -v), npm: $(npm -v)"

            cd /var/www/burch-contracting

            # Sync to latest main (handle any local drift)
            git fetch origin main
            git stash --include-untracked || true
            git checkout main
            git reset --hard origin/main
            echo "Git: $(git log --oneline -1)"

            # Install dependencies (fall back to npm install if lockfile mismatches)
            rm -rf .next .swc
            npm ci --production=false || (echo "npm ci failed, falling back to npm install" && npm install --production=false)

            # Build
            npm run build
            echo "Build complete"

            # Restart PM2 — ensure it runs from the correct cwd
            APP_CWD=/var/www/burch-contracting
            if pm2 describe burch-contracting > /dev/null 2>&1; then
              RUNNING_CWD=$(pm2 show burch-contracting 2>/dev/null | grep 'exec cwd' | awk '{print $NF}')
              if [ "$RUNNING_CWD" = "$APP_CWD" ]; then
                pm2 restart burch-contracting --update-env
              else
                echo "PM2 cwd mismatch ($RUNNING_CWD != $APP_CWD) — recreating process"
                pm2 delete burch-contracting
                pm2 start npm --name burch-contracting --cwd "$APP_CWD" -- start
              fi
            else
              pm2 start npm --name burch-contracting --cwd "$APP_CWD" -- start
            fi
            pm2 save

            # Wait for app readiness before running full smoke checks
            HEALTH_URL="https://burchcontracting.com/api/health"
            for i in {1..12}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check ready: $HEALTH_URL"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed after waiting: $HEALTH_URL (last status: $STATUS)"
                exit 1
              fi
              echo "Waiting for health check ($i/12), last status: $STATUS"
              sleep 5
            done

            # Full production smoke checks; fail deploy if any endpoint fails
            npm run verify:production -- --base-url=https://burchcontracting.com
            echo "Deploy finished at $(date)"
